<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050810"/>
      <stop offset="1" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#DC143C"/>
      <stop offset="1" stop-color="#00FF88"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.35"/>
    </pattern>
    <!-- Soft vignette: keeps edges dark for X crop -->
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.35"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Safe area ~70% × 70% centered: 840 × 441 at (180, 94.5) ? integer (180, 95) -->
  <rect x="180" y="95" width="840" height="440" rx="28" fill="#050810" fill-opacity="0.88" stroke="#1f2937" stroke-width="1.5"/>
  <rect x="196" y="111" width="808" height="408" rx="20" fill="#000000" fill-opacity="0.35"/>

  <!-- Content stack: centered at x=600 -->
  <g font-family="Rajdhani, system-ui, -apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <text x="600" y="168" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="3">
      #POLSKA<tspan fill="#DC143C">2038</tspan>
    </text>

    <rect x="360" y="188" width="480" height="5" rx="2.5" fill="url(#accent)" opacity="0.95"/>

    <!-- LiDAR line: extra vertical rhythm for small previews -->
    <text x="600" y="238" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="23" font-weight="700" fill="#00FF88" letter-spacing="5">
      LiDAR
    </text>
    <text x="600" y="276" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="23" font-weight="700" fill="#00FF88" letter-spacing="5">
      AI
    </text>
    <text x="600" y="314" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="23" font-weight="700" fill="#00FF88" letter-spacing="5">
      PostGIS
    </text>

    <text x="600" y="358" font-size="26" font-weight="600" fill="#e5e7eb" opacity="0.95">
      Narodowy OS sportu · reforma i dane
    </text>

    <!-- ROI block: high contrast, centered -->
    <g transform="translate(600, 418)">
      <rect x="-200" y="-52" width="400" height="104" rx="16" fill="#0b1224" fill-opacity="0.95" stroke="#00FF88" stroke-opacity="0.35" stroke-width="1"/>
      <text x="0" y="-8" font-family="JetBrains Mono, ui-monospace" font-size="15" font-weight="700" fill="#9ca3af" letter-spacing="6">ROI</text>
      <text x="0" y="38" font-size="52" font-weight="800" fill="#00FF88" letter-spacing="2">370%</text>
    </g>
  </g>
</svg>
